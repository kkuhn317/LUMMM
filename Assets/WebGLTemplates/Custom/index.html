<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta
      http-equiv="Content-Type"
      content="text/html; charset=utf-8"
    >

    <title>Unity WebGL Player | Level Up - Mario's Minigames Mayhem</title>

    <link
      rel="shortcut icon"
      href="TemplateData/favicon.ico"
    >

    <link
      rel="stylesheet"
      href="TemplateData/style.css"
    >

    <!-- Load after Unity's default CSS so these rules take priority. -->
    <link
      rel="stylesheet"
      href="WebGLTemplateResizePatch.css"
    >
  </head>

  <body>
    <div
      id="unity-container"
      class="unity-desktop"
    >
      <canvas
        id="unity-canvas"
        width="960"
        height="600"
        tabindex="-1"
      ></canvas>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>

        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>

        <!-- Fullscreen button removed to prevent automatic fullscreen activation. -->

        <div id="unity-build-title">
          Level Up - Mario's Minigames Mayhem
        </div>
      </div>
    </div>

    <script>
      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingBar = document.querySelector("#unity-loading-bar");
      const progressBarFull = document.querySelector(
        "#unity-progress-bar-full"
      );
      const warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(message, type) {
        function updateBannerVisibility() {
          warningBanner.style.display =
            warningBanner.children.length > 0
              ? "block"
              : "none";
        }

        const banner = document.createElement("div");
        banner.innerHTML = message;
        warningBanner.appendChild(banner);

        if (type === "error") {
          banner.style.background = "red";
          banner.style.padding = "10px";
        } else {
          if (type === "warning") {
            banner.style.background = "yellow";
            banner.style.padding = "10px";
          }

          window.setTimeout(() => {
            if (banner.parentNode === warningBanner) {
              warningBanner.removeChild(banner);
            }

            updateBannerVisibility();
          }, 5000);
        }

        updateBannerVisibility();
      }

      const buildUrl = "Build";
      const loaderUrl = `${buildUrl}/Mario.loader.js`;

      const config = {
        dataUrl: `${buildUrl}/Mario.data.br`,
        frameworkUrl: `${buildUrl}/Mario.framework.js.br`,
        codeUrl: `${buildUrl}/Mario.wasm.br`,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Roombie _ BookwormKevin",
        productName: "LevelUpMMM",
        productVersion: "1.2.1",
        showBanner: unityShowBanner,

        // Unity updates its WebGL render resolution to match the canvas CSS size.
        matchWebGLToCanvasSize: true
      };

      const isMobileDevice =
        /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      if (isMobileDevice) {
        const viewportMeta = document.createElement("meta");

        viewportMeta.name = "viewport";
        viewportMeta.content =
          "width=device-width, " +
          "height=device-height, " +
          "initial-scale=1.0, " +
          "user-scalable=no, " +
          "shrink-to-fit=yes";

        document.head.appendChild(viewportMeta);

        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        /*
         * Do not set canvas.style.width or canvas.style.height here.
         * The responsive CSS and WebGLTemplateResizePatch.js control them.
         */
        container.className = "unity-desktop";
      }

      loadingBar.style.display = "block";

      const loaderScript = document.createElement("script");
      loaderScript.src = loaderUrl;

      loaderScript.onload = () => {
        createUnityInstance(
          canvas,
          config,
          (progress) => {
            progressBarFull.style.width = `${100 * progress}%`;
          }
        )
          .then((unityInstance) => {
            loadingBar.style.display = "none";

            /*
             * Make the instance accessible if the resize patch or another
             * browser-side integration needs it later.
             */
            window.unityInstance = unityInstance;

            window.dispatchEvent(
              new CustomEvent("unity-instance-ready", {
                detail: {
                  unityInstance
                }
              })
            );
          })
          .catch((message) => {
            alert(message);
          });
      };

      loaderScript.onerror = () => {
        unityShowBanner(
          `Failed to load the Unity loader: ${loaderUrl}`,
          "error"
        );
      };

      document.body.appendChild(loaderScript);
    </script>

    <!-- Load after the Unity container and canvas exist. -->
    <script src="WebGLTemplateResizePatch.js"></script>
  </body>
</html>
